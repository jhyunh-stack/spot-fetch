<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SpotFetch</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F8FA;--surface:#fff;--border:#E5E7EB;
  --t1:#111827;--t2:#6B7280;--t3:#9CA3AF;
  --accent:#6C63FF;--accent-bg:#EEEEFF;
  --c0:#FF6B6B;--c1:#4ECDC4;--c2:#A78BFA;
  --c0l:#FFF0F0;--c1l:#F0FFFE;--c2l:#F5F0FF;
  --sh1:0 1px 4px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.08);--sh3:0 8px 32px rgba(0,0,0,.12);
  --r1:10px;--r2:16px;--r3:20px;--r4:28px;
  --nav:68px
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e0e0e0}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--surface);overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.15);position:relative}

/* ── Tab panels ── */
.tab-panel{flex:1;overflow:hidden;display:none;flex-direction:column}
.tab-panel.active{display:flex}

/* ── Bottom nav ── */
#nav{height:var(--nav);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;cursor:pointer;color:var(--t3);transition:color .2s;background:none;border:none;font-family:inherit}
.nav-btn.on{color:var(--accent)}
.nav-ic{font-size:22px;line-height:1}
.nav-lb{font-size:10px;font-weight:600;letter-spacing:.2px}

/* ── Page header ── */
.ph{padding:18px 20px 10px;flex-shrink:0}
.ph-title{font-size:22px;font-weight:800;letter-spacing:-.6px;color:var(--t1)}
.ph-sub{font-size:13px;color:var(--t2);margin-top:2px}

/* ═══════════════════════════════
   SAVED TAB
═══════════════════════════════ */
#tab-saved{background:var(--bg)}
.feed{flex:1;overflow-y:auto;padding:4px 16px 20px}
.feed::-webkit-scrollbar{display:none}

.reel-card{background:var(--surface);border-radius:var(--r3);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh1)}
.reel-thumb{height:155px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.reel-thumb-emoji{font-size:52px;opacity:.55}
.plat-badge{position:absolute;top:10px;left:10px;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
.b-ig{background:linear-gradient(135deg,#f09433,#dc2743,#bc1888)}
.b-tt{background:#010101}
.reel-del{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:background .2s}
.reel-del:active{background:rgba(220,38,38,.8)}
.reel-body{padding:13px 16px 8px}
.reel-user{font-size:11px;color:var(--t2);font-weight:600;margin-bottom:3px}
.reel-title{font-size:15px;font-weight:700;line-height:1.35;color:var(--t1)}
.reel-meta{font-size:12px;color:var(--t3);margin-top:4px}
.reel-expand{width:100%;padding:10px 16px;background:var(--bg);border:none;border-top:1px solid var(--border);font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:inherit;transition:background .15s}
.reel-expand:active{background:var(--accent-bg)}
.arrow{transition:transform .28s;display:inline-block}
.arrow.open{transform:rotate(180deg)}
.reel-spots{overflow:hidden;max-height:0;transition:max-height .3s ease;background:var(--bg)}
.reel-spots.open{max-height:500px}
.spot-mini{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:12px}
.spot-mini:last-child{border-bottom:none}
.smic-emoji{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.smic-info{flex:1;min-width:0}
.smic-name{font-size:13px;font-weight:700;color:var(--t1)}
.smic-desc{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smic-del{width:27px;height:27px;border-radius:50%;background:#FFF0F0;color:#EF4444;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.smic-del:active{background:#FECACA}

/* ═══════════════════════════════
   PLAN TAB
═══════════════════════════════ */
#tab-plan{position:relative;background:var(--bg)}
.mode-bar{padding:10px 16px;display:flex;gap:8px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);z-index:10}
.mode-btn{flex:1;padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .2s}
.mode-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* map view */
#map-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
#leaflet-map{flex:1;min-height:0}

/* bottom sheet */
.bsheet{background:var(--surface);border-radius:var(--r4) var(--r4) 0 0;padding:6px 0 0;max-height:46vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.07);flex-shrink:0}
.bsheet::-webkit-scrollbar{display:none}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}

/* pre-route sheet */
.pre-sheet{padding:0 20px 22px}
.spot-count-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.scount-text{font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.4px}
.scount-sub{font-size:12px;color:var(--t2);margin-top:3px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.chip{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:3px}
.gen-btn{width:100%;padding:15px;border-radius:var(--r2);background:var(--accent);color:#fff;border:none;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:-.3px;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px}
.gen-btn:active{transform:scale(.98);opacity:.9}

/* post-route sheet */
.route-hdr{padding:0 20px 12px}
.route-title-row{display:flex;align-items:center;justify-content:space-between}
.route-title{font-size:15px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.reset-btn{font-size:12px;color:var(--t2);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600}
.route-story{font-size:12px;color:var(--t2);background:var(--bg);padding:9px 13px;border-radius:var(--r1);margin-top:8px;line-height:1.6}
.day-grp{padding:12px 20px;border-top:1px solid var(--border)}
.day-grp-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.day-badge{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:800;color:#fff}
.day-story-txt{font-size:12px;color:var(--t2)}
.day-spot-row{display:flex;align-items:center;gap:11px;padding:5px 0;position:relative}
.day-spot-row:not(:last-child)::after{content:'';position:absolute;left:13px;top:33px;bottom:-5px;width:2px;background:var(--border)}
.day-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.day-sname{font-size:13px;font-weight:700;color:var(--t1)}
.day-sdesc{font-size:11px;color:var(--t2)}

/* spots view */
#spots-view{flex:1;overflow-y:auto;padding:12px 16px 20px;background:var(--bg)}
#spots-view::-webkit-scrollbar{display:none}
.spot-card{background:var(--surface);border-radius:var(--r2);padding:13px 14px;margin-bottom:10px;display:flex;align-items:center;gap:13px;box-shadow:var(--sh1);transition:all .28s}
.spot-card.removing{opacity:0;transform:translateX(16px) scale(.96)}
.sc-emoji{width:44px;height:44px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.sc-info{flex:1;min-width:0}
.sc-name{font-size:14px;font-weight:700;color:var(--t1)}
.sc-desc{font-size:12px;color:var(--t2);margin-top:3px}
.sc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sc-del{width:32px;height:32px;border-radius:50%;background:#FFF0F0;color:#EF4444;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.sc-del:active{background:#FECACA}

/* spot detail panel */
#detail-panel{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:var(--r4) var(--r4) 0 0;padding:6px 20px 28px;box-shadow:0 -8px 40px rgba(0,0,0,.13);transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);z-index:500;max-height:52vh;overflow-y:auto}
#detail-panel.on{transform:translateY(0)}
#detail-panel::-webkit-scrollbar{display:none}
.detail-hdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.detail-em{width:56px;height:56px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.detail-name{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
.detail-why{font-size:13px;color:var(--t2);margin-top:5px;line-height:1.45}
.detail-close{margin-left:auto;width:28px;height:28px;border-radius:50%;background:var(--bg);border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t2);margin-top:2px}
.detail-div{height:1px;background:var(--border);margin:12px 0}
.detail-body{font-size:13px;color:var(--t2);line-height:1.7}

/* density modal */
#density-modal{position:absolute;inset:0;z-index:800;display:flex;align-items:flex-end;background:rgba(0,0,0,.38);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .22s}
#density-modal.on{opacity:1;pointer-events:all}
.density-sheet{width:100%;background:var(--surface);border-radius:var(--r4) var(--r4) 0 0;padding:6px 20px 32px;transform:translateY(16px);transition:transform .22s cubic-bezier(.32,.72,0,1)}
#density-modal.on .density-sheet{transform:translateY(0)}
.density-title{font-size:18px;font-weight:800;margin:14px 0 5px;letter-spacing:-.4px;color:var(--t1)}
.density-sub{font-size:13px;color:var(--t2);margin-bottom:18px}
.d-opt{width:100%;padding:15px 16px;border-radius:var(--r2);border:2px solid var(--border);background:var(--surface);margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;font-family:inherit;transition:all .18s;text-align:left}
.d-opt.on{border-color:var(--accent);background:var(--accent-bg)}
.d-ic{font-size:24px;flex-shrink:0}
.d-label{font-size:14px;font-weight:700;color:var(--t1)}
.d-desc{font-size:12px;color:var(--t2);margin-top:2px}
.d-check{margin-left:auto;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.d-opt.on .d-check{display:flex}
.d-confirm{width:100%;padding:15px;border-radius:var(--r2);background:var(--accent);color:#fff;border:none;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:6px;letter-spacing:-.3px;transition:all .18s}
.d-confirm:active{opacity:.9;transform:scale(.99)}

/* generating overlay */
#gen-overlay{position:absolute;inset:0;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:700;opacity:0;pointer-events:none;transition:opacity .25s}
#gen-overlay.on{opacity:1;pointer-events:all}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-title{font-size:15px;font-weight:800;color:var(--t1)}
.gen-sub{font-size:13px;color:var(--t2);margin-top:6px}

/* ═══════════════════════════════
   EXPLORE TAB
═══════════════════════════════ */
#tab-explore{background:var(--bg)}
.ex-feed{flex:1;overflow-y:auto;padding:4px 16px 20px}
.ex-feed::-webkit-scrollbar{display:none}
.ex-card{background:var(--surface);border-radius:var(--r3);margin-bottom:14px;overflow:hidden;box-shadow:var(--sh1)}
.ex-thumb{height:115px;display:flex;align-items:flex-end;padding:12px;position:relative}
.ex-author{background:rgba(0,0,0,.45);backdrop-filter:blur(4px);color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.ex-body{padding:13px 16px 8px}
.ex-title{font-size:16px;font-weight:800;letter-spacing:-.3px;color:var(--t1)}
.ex-story{font-size:12px;color:var(--t2);margin-top:3px}
.ex-spots{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ex-pill{padding:5px 10px;border-radius:20px;background:var(--bg);font-size:12px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:3px}
.ex-actions{display:flex;gap:8px;padding:10px 16px 16px}
.ex-btn{flex:1;padding:10px;border-radius:var(--r1);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s}
.ex-primary{background:var(--accent);color:#fff}
.ex-secondary{background:var(--bg);color:var(--t1)}
.ex-btn:active{opacity:.85;transform:scale(.98)}
.ex-btn.done-green{background:#DCFCE7;color:#16A34A;pointer-events:none}
.ex-btn.done-blue{background:var(--accent-bg);color:var(--accent);pointer-events:none}

/* empty state */
.empty{padding:52px 20px;text-align:center;color:var(--t3)}
.empty-ic{font-size:40px;margin-bottom:12px}
.empty-tx{font-size:14px;font-weight:600}

/* toast */
#toast{position:absolute;bottom:calc(var(--nav) + 14px);left:50%;transform:translateX(-50%) translateY(12px);background:#1A1A2E;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:all .28s;z-index:999;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* leaflet overrides */
.leaflet-container{font-family:inherit}
.sf-mkr{width:40px;height:40px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:transform .2s,box-shadow .2s;background:#ccc}
.sf-mkr.sel{transform:scale(1.28);box-shadow:0 5px 20px rgba(0,0,0,.28);z-index:999}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{border:none!important;box-shadow:var(--sh2)!important;border-radius:var(--r1)!important;overflow:hidden}
.leaflet-control-zoom a{color:var(--t1)!important;font-weight:700!important}
</style>
</head>
<body>
<div id="app">

  <!-- ══════════════ SAVED TAB ══════════════ -->
  <div id="tab-saved" class="tab-panel active">
    <div class="ph">
      <div class="ph-title">저장됨</div>
      <div class="ph-sub" id="saved-sub">로딩 중...</div>
    </div>
    <div class="feed" id="saved-feed"></div>
  </div>

  <!-- ══════════════ PLAN TAB ══════════════ -->
  <div id="tab-plan" class="tab-panel">
    <div class="mode-bar">
      <button class="mode-btn on" id="btn-map" onclick="setPlanMode('map')">🗺 지도 보기</button>
      <button class="mode-btn" id="btn-spots" onclick="setPlanMode('spots')">📍 스팟별 보기</button>
    </div>

    <!-- Map View -->
    <div id="map-view">
      <div id="leaflet-map"></div>
      <div class="bsheet" id="bsheet"></div>
    </div>

    <!-- Spots View -->
    <div id="spots-view" style="display:none"></div>

    <!-- Spot Detail Panel -->
    <div id="detail-panel"></div>

    <!-- Density Modal -->
    <div id="density-modal" onclick="if(event.target===this)closeDensity()">
      <div class="density-sheet">
        <div class="handle"></div>
        <div class="density-title">어떻게 여행할까요?</div>
        <div class="density-sub" id="density-sub-txt">저장한 스팟으로 루트를 만들어드릴게요</div>
        <button class="d-opt" data-d="1" onclick="pickDensity(1)">
          <span class="d-ic">⚡</span>
          <div><div class="d-label">1일로 빡세게</div><div class="d-desc">모든 스팟, 하루에 몰아서</div></div>
          <div class="d-check">✓</div>
        </button>
        <button class="d-opt on" data-d="2" onclick="pickDensity(2)">
          <span class="d-ic">✌️</span>
          <div><div class="d-label">2일로 나눠</div><div class="d-desc">여유있게 이틀에 걸쳐서</div></div>
          <div class="d-check">✓</div>
        </button>
        <button class="d-opt" data-d="3" onclick="pickDensity(3)">
          <span class="d-ic">🌅</span>
          <div><div class="d-label">3일로 여유롭게</div><div class="d-desc">느긋하게, 각 스팟에 충분히</div></div>
          <div class="d-check">✓</div>
        </button>
        <button class="d-confirm" onclick="confirmRoute()">루트 만들기 ✨</button>
      </div>
    </div>

    <!-- Generating overlay -->
    <div id="gen-overlay">
      <div class="spinner"></div>
      <div class="gen-title">루트 만드는 중...</div>
      <div class="gen-sub">저장된 스팟으로 최적 동선 계산 중</div>
    </div>
  </div>

  <!-- ══════════════ EXPLORE TAB ══════════════ -->
  <div id="tab-explore" class="tab-panel">
    <div class="ph">
      <div class="ph-title">탐색</div>
      <div class="ph-sub">다른 사람들의 루트</div>
    </div>
    <div class="ex-feed" id="ex-feed"></div>
  </div>

  <!-- ══════════════ NAV ══════════════ -->
  <nav id="nav">
    <button class="nav-btn on" onclick="switchTab('saved')">
      <span class="nav-ic">🔖</span><span class="nav-lb">저장됨</span>
    </button>
    <button class="nav-btn" onclick="switchTab('plan')">
      <span class="nav-ic">🗺️</span><span class="nav-lb">플랜</span>
    </button>
    <button class="nav-btn" onclick="switchTab('explore')">
      <span class="nav-ic">✨</span><span class="nav-lb">탐색</span>
    </button>
  </nav>

  <div id="toast"></div>
</div>

<script>
// ══════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════
const C  = ['#FF6B6B','#4ECDC4','#A78BFA'];
const CL = ['#FFF0F0','#F0FFFE','#F5F0FF'];

// Pre-built route configs
const ROUTES = {
  1:{days:1,groups:[
    {label:'Day 1',story:'브리지 뷰 → 트레일 → 카페 → 노을 해변',ci:0,
     ids:['s1','s2','s3','s4','s5','s6','s7']}
  ]},
  2:{days:2,groups:[
    {label:'Day 1',story:'브리지 & 해안 트레일',ci:0, ids:['s1','s2','s3']},
    {label:'Day 2',story:'브런치 카페 → 노을 해변 드라이브',ci:1, ids:['s4','s5','s6','s7']}
  ]},
  3:{days:3,groups:[
    {label:'Day 1',story:'브리지 & 해변',ci:0, ids:['s1','s2']},
    {label:'Day 2',story:'카페 & 베이커리 투어',ci:1, ids:['s3','s4','s5']},
    {label:'Day 3',story:'해안 드라이브',ci:2, ids:['s6','s7']}
  ]}
};

// ══════════════════════════════════════════
//  MOCK DATA
// ══════════════════════════════════════════
const SPOTS_DATA = [

// ══════════════════════════════════════════
//  PROXIMITY CLUSTERING (k-means, lat/lng 기반)
// ══════════════════════════════════════════
function kMeans(spots, k) {
  if (!spots.length) return [];
  k = Math.min(k, spots.length);

  // 초기 중심: 위도 기준 균등 분산
  const sorted = [...spots].sort((a,b)=>a.lat - b.lat);
  let centroids = Array.from({length:k}, (_,i) => {
    const s = sorted[Math.floor(i * spots.length / k)];
    return {lat: s.lat, lng: s.lng};
  });

  let assignments = spots.map(()=>0);

  for (let iter = 0; iter < 20; iter++) {
    const prev = [...assignments];
    // 각 스팟을 가장 가까운 centroid에 배정
    assignments = spots.map(sp => {
      let best = 0, bestD = Infinity;
      centroids.forEach((c,ci) => {
        const d = (sp.lat-c.lat)**2 + (sp.lng-c.lng)**2;
        if (d < bestD) { bestD = d; best = ci; }
      });
      return best;
    });
    // centroid 재계산
    for (let ci = 0; ci < k; ci++) {
      const grp = spots.filter((_,i) => assignments[i] === ci);
      if (grp.length) {
        centroids[ci] = {
          lat: grp.reduce((s,sp)=>s+sp.lat,0)/grp.length,
          lng: grp.reduce((s,sp)=>s+sp.lng,0)/grp.length,
        };
      }
    }
    if (assignments.every((a,i)=>a===prev[i])) break;
  }

  // 북쪽 클러스터 = 인덱스 0 되도록 centroid 위도 기준 재정렬
  const order = centroids
    .map((c,i)=>({i, lat:c.lat}))
    .sort((a,b)=>b.lat-a.lat)  // 위도 높은(북쪽) 순
    .map(x=>x.i);
  const remap = {};
  order.forEach((oldCi, newCi) => { remap[oldCi] = newCi; });
  return assignments.map(a => remap[a]);
}

function recomputeClusters() {
  const k = S.spots.length <= 3 ? 1 : S.spots.length <= 5 ? 2 : 3;
  const assignments = kMeans(S.spots, k);
  S.spots.forEach((sp, i) => { sp.cluster = assignments[i] ?? 0; });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('on'), 2200);
}

function getSpot(id) { return S.spots.find(s=>s.id===id); }

function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('active');
  const idx = ['saved','plan','explore'].indexOf(tab);
  document.querySelectorAll('.nav-btn')[idx].classList.add('on');
  if(tab==='plan') setTimeout(()=>initMap(), 60);
}

function renderSaved() {
  const feed = document.getElementById('saved-feed');
  const reels = REELS_DATA.filter(r => S.spots.some(s=>s.reelId===r.id));

  if (!reels.length) {
    feed.innerHTML = `<div class="empty"><div class="empty-ic">🔖</div><div class="empty-tx">저장된 릴이 없어요</div></div>`;

    return;
  }

  feed.innerHTML = reels.map(r=>{
    const spots = S.spots.filter(s=>s.reelId===r.id);
    const exp = S.expanded.has(r.id);
    const badge = r.platform==='instagram' ? '<span class="plat-badge b-ig">📸 Instagram</span>' : '<span class="plat-badge b-tt">🎵 TikTok</span>';
    return `
    <div class="reel-card" id="rc-${r.id}">
      <div class="reel-thumb" style="background:${r.grad}">
        <span class="reel-thumb-emoji">${r.ic}</span>
        ${badge}
        <button class="reel-del" onclick="delReel('${r.id}')">✕</button>
      </div>
      <div class="reel-body">
        <div class="reel-user">${r.user}</div>
        <div class="reel-title">${r.title}</div>
        <div class="reel-meta">${r.savedAt} · 스팟 ${spots.length}개</div>
      </div>
      <button class="reel-expand" onclick="toggleReel('${r.id}')">
        <span>스팟 ${spots.length}개 보기</span>
        <span class="arrow ${exp?'open':''}">▾</span>
      </button>
      <div class="reel-spots ${exp?'open':''}" id="rs-${r.id}">
        ${spots.map(sp=>`
          <div class="spot-mini" id="sm-${sp.id}">
            <div class="smic-emoji" style="background:${CL[sp.cluster]}">${sp.emoji}</div>
            <div class="smic-info">
              <div class="smic-name">${sp.name}</div>
              <div class="smic-desc">${sp.desc}</div>
            </div>
            <button class="smic-del" onclick="delSpot('${sp.id}')">✕</button>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('saved-sub').textContent = `릴 ${reels.length}개 · 스팟 ${S.spots.length}개`;
}

function toggleReel(id) {
  S.expanded.has(id) ? S.expanded.delete(id) : S.expanded.add(id);
  renderSaved();
}

function delReel(reelId) {
  S.spots = S.spots.filter(s=>s.reelId!==reelId);
  recomputeClusters();
  renderSaved(); syncMap(); if(S.planMode==='spots') renderSpots();
  updateBsheet();
  toast('릴이 삭제됐어요');
}

function delSpot(spotId) {
  S.spots = S.spots.filter(s=>s.id!==spotId);
  recomputeClusters();
  renderSaved(); syncMap(); if(S.planMode==='spots') renderSpots();
  updateBsheet();
  toast('스팟이 삭제됐어요');
}

// ══════════════════════════════════════════
//  MAP
// ══════════════════════════════════════════
function initMap() {
  if (S.mapInited) { S.map.invalidateSize(); return; }

  const map = L.map('leaflet-map',{
    center:[37.68,-122.47], zoom:11,
    zoomControl:true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    maxZoom:19, subdomains:'abcd'
  }).addTo(map);

  S.map = map;
  S.mapInited = true;

  addAllMarkers();
  fitSpots();
  renderBsheet();
}

function mkIcon(spot, sel=false) {
  const bg = C[spot.cluster];
  return L.divIcon({
    html:`<div class="sf-mkr${sel?' sel':''}" style="background:${bg}">${spot.emoji}</div>`,
    className:'',iconSize:[40,40],iconAnchor:[20,20]
  });
}

function addAllMarkers() {
  Object.values(S.markers).forEach(m=>m.remove());
  S.markers = {};
  S.spots.forEach(sp=>{
    const m = L.marker([sp.lat,sp.lng],{icon:mkIcon(sp)}).addTo(S.map);
    m.on('click',()=>selectSpot(sp.id));
    S.markers[sp.id] = m;
  });
}

function syncMap() {
  if (!S.mapInited) return;
  const ids = new Set(S.spots.map(s=>s.id));
  Object.entries(S.markers).forEach(([id,m])=>{
    if (!ids.has(id)) { m.remove(); delete S.markers[id]; }
  });
  S.spots.forEach(sp=>{
    if (!S.markers[sp.id]) {
      const m = L.marker([sp.lat,sp.lng],{icon:mkIcon(sp)}).addTo(S.map);
      m.on('click',()=>selectSpot(sp.id));
      S.markers[sp.id] = m;
    }
  });
}

function fitSpots() {
  if (!S.map || !S.spots.length) return;
  const bounds = S.spots.map(s=>[s.lat,s.lng]);
  S.map.fitBounds(bounds,{padding:[50,50]});
}

function selectSpot(id) {
  // Deselect prev
  if (S.selSpot && S.markers[S.selSpot]) {
    const prev = getSpot(S.selSpot) || SPOTS_DATA.find(s=>s.id===S.selSpot);
    if (prev) S.markers[S.selSpot].setIcon(mkIcon(prev,false));
  }
  S.selSpot = id;
  const sp = getSpot(id);
  if (sp && S.markers[id]) S.markers[id].setIcon(mkIcon(sp,true));
  showDetail(id);
}

function showDetail(id) {
  const sp = getSpot(id);
  if (!sp) return;
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <div class="handle"></div>
    <div class="detail-hdr">
      <div class="detail-em" style="background:${CL[sp.cluster]}">${sp.emoji}</div>
      <div style="flex:1">
        <div class="detail-name">${sp.name}</div>
        <div class="detail-why">${sp.desc}</div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-div"></div>
    <div class="detail-body">${sp.detail}</div>
  `;
  panel.classList.add('on');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('on');
  if (S.selSpot && S.markers[S.selSpot]) {
    const sp = getSpot(S.selSpot) || SPOTS_DATA.find(s=>s.id===S.selSpot);
    if (sp) S.markers[S.selSpot].setIcon(mkIcon(sp,false));
  }
  S.selSpot = null;
}

// ══════════════════════════════════════════
//  BOTTOM SHEET
// ══════════════════════════════════════════
function renderBsheet() { updateBsheet(); }

function updateBsheet() {
  if (!S.mapInited) return;
  const el = document.getElementById('bsheet');
  if (S.planState === 'pre') {
    const chips = S.spots.map(sp=>
      `<span class="chip" style="background:${CL[sp.cluster]};color:${C[sp.cluster]}">${sp.emoji} ${sp.name.split(' ')[0]}</span>`
    ).join('');
    el.innerHTML = `
      <div class="handle"></div>
      <div class="pre-sheet">
        <div class="spot-count-row">
          <div>
            <div class="scount-text">저장된 스팟 ${S.spots.length}개</div>
            <div class="scount-sub">루트로 만들어드릴게요</div>
          </div>
        </div>
        <div class="chips">${chips}</div>
        <button class="gen-btn" onclick="openDensity()">✨ 루트 만들어보기</button>
      </div>`;
  } else {
    const cfg = ROUTES[S.days];
    const allStories = cfg.groups.map(g=>g.story).join(' / ');
    const groups = cfg.groups.map((g,i)=>{
      const color = C[g.ci];
      const spots = g.ids.map(id=>S.spots.find(s=>s.id===id)).filter(Boolean);
      if (!spots.length) return '';
      return `
        <div class="day-grp">
          <div class="day-grp-hdr">
            <span class="day-badge" style="background:${color}">${g.label}</span>
            <span class="day-story-txt">${g.story}</span>
          </div>
          ${spots.map((sp,idx)=>`
            <div class="day-spot-row">
              <div class="day-dot" style="background:${color}">${sp.emoji}</div>
              <div>
                <div class="day-sname">${sp.name}</div>
                <div class="day-sdesc">${sp.desc}</div>
              </div>
            </div>`).join('')}
        </div>`;
    }).join('');

    el.innerHTML = `
      <div class="handle"></div>
      <div class="route-hdr">
        <div class="route-title-row">
          <div class="route-title">${S.days}일 루트 완성 ✨</div>
          <button class="reset-btn" onclick="resetRoute()">다시 설정</button>
        </div>
        <div class="route-story">${allStories}</div>
      </div>
      ${groups}`;
  }
}

// ══════════════════════════════════════════
//  ROUTE GENERATION
// ══════════════════════════════════════════
function openDensity() {
  document.getElementById('density-sub-txt').textContent = `저장한 스팟 ${S.spots.length}개로 루트를 만들어드릴게요`;
  document.getElementById('density-modal').classList.add('on');
}
function closeDensity() {
  document.getElementById('density-modal').classList.remove('on');
}
function pickDensity(d) {
  S.days = d;
  document.querySelectorAll('.d-opt').forEach(b=>b.classList.toggle('on', parseInt(b.dataset.d)===d));
}
function confirmRoute() {
  closeDensity();
  document.getElementById('gen-overlay').classList.add('on');
  setTimeout(()=>{
    document.getElementById('gen-overlay').classList.remove('on');
    generateRoute();
  }, 1800);
}

function generateRoute() {
  S.planState = 'generated';
  // Remove old lines
  S.lines.forEach(l=>l.remove()); S.lines = [];

  const cfg = ROUTES[S.days];
  cfg.groups.forEach((g,i)=>{
    const color = C[g.ci];
    const spots = g.ids.map(id=>S.spots.find(s=>s.id===id)).filter(Boolean);
    if (spots.length < 2) return;
    // Update marker colors to day group color
    spots.forEach(sp=>{
      if (S.markers[sp.id]) {
        const tmpSpot = {...sp, cluster: g.ci};
        S.markers[sp.id].setIcon(mkIcon(tmpSpot, S.selSpot===sp.id));
      }
    });
    // Draw polyline
    const lls = spots.map(s=>[s.lat,s.lng]);
    const line = L.polyline(lls,{color,weight:3.5,opacity:.75,dashArray:'8,5'}).addTo(S.map);
    S.lines.push(line);
  });

  updateBsheet();
  toast(`${S.days}일 루트가 만들어졌어요 ✨`);
}

function resetRoute() {
  S.planState = 'pre';
  S.lines.forEach(l=>l.remove()); S.lines = [];
  S.selSpot = null;
  closeDetail();
  // Restore original cluster colors
  S.spots.forEach(sp=>{
    if (S.markers[sp.id]) S.markers[sp.id].setIcon(mkIcon(sp,false));
  });
  updateBsheet();
}

  document.getElementById('spots-view').style.display = mode==='spots' ? 'block' : 'none';
  if (mode==='map') { setTimeout(()=>{ if(S.map) S.map.invalidateSize(); },50); }
  else { closeDetail(); renderSpots(); }
}

  view.innerHTML = S.spots.map(sp=>`
    <div class="spot-card" id="sc-${sp.id}">
      <div class="sc-emoji" style="background:${CL[sp.cluster]}">${sp.emoji}</div>
      <div class="sc-info">
        <div class="sc-name">${sp.name}</div>
        <div class="sc-desc">${sp.desc}</div>
      </div>
      <div class="sc-dot" style="background:${C[sp.cluster]}"></div>
      <button class="sc-del" onclick="delSpotAnim('${sp.id}')">✕</button>
    </div>`).join('');
}

function delSpotAnim(id) {
  const el = document.getElementById('sc-'+id);
  if (el) {
    el.classList.add('removing');
    setTimeout(()=>{ delSpot(id); renderSpots(); }, 260);
  }
}

// ══════════════════════════════════════════
//  EXPLORE TAB
// ══════════════════════════════════════════
function renderExplore() {
  document.getElementById('ex-feed').innerHTML = EXPLORE_DATA.map(r=>`
    <div class="ex-card">
      <div class="ex-thumb" style="background:${r.grad}">
        <span class="ex-author">${r.author}</span>
      </div>
      <div class="ex-body">
        <div class="ex-title">${r.title}</div>
        <div class="ex-story">${r.story}</div>
        <div class="ex-spots">
          ${r.spots.map(s=>`<span class="ex-pill">${s.e} ${s.n}</span>`).join('')}
        </div>
      </div>
      <div class="ex-actions">
        <button class="ex-btn ex-primary" onclick="addToPlan(this)">내 플랜에 추가</button>
        <button class="ex-btn ex-secondary" onclick="saveSpots(this)">스팟 저장</button>
      </div>
    </div>`).join('');
}

function addToPlan(btn) {
  btn.textContent = '추가됨 ✓';
  btn.classList.add('done-blue');
  toast('내 플랜에 추가됐어요 ✨');
}
function saveSpots(btn) {
  btn.textContent = '저장됨 ✓';
  btn.classList.add('done-green');
  toast('스팟이 저장됐어요 🔖');
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
renderSaved();
renderExplore();
</script>
</body>
</html>
