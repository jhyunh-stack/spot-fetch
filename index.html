<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
      min-height: 100vh;
      padding: 48px 16px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 28px;
      margin-bottom: 28px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 18px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #1e293b;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      border-color: #3b82f6;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .save-btn {
      width: 100%;
      padding: 13px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s, transform 0.1s;
    }

    .save-btn:hover { background: #2563eb; }
    .save-btn:active { transform: scale(0.98); }

    .trips-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .trips-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #334155;
      margin: 0;
    }

    .clear-btn {
      font-size: 0.8rem;
      color: #ef4444;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .clear-btn:hover { background: #fef2f2; }

    .trip-item {
      border: 1.5px solid #f1f5f9;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: box-shadow 0.2s;
    }

    .trip-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    .trip-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .trip-body { flex: 1; min-width: 0; }

    .trip-destination {
      font-weight: 700;
      font-size: 1rem;
      color: #0f172a;
      margin-bottom: 3px;
    }

    .trip-date {
      font-size: 0.8rem;
      color: #3b82f6;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .trip-memo {
      font-size: 0.875rem;
      color: #64748b;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .delete-btn:hover { color: #ef4444; background: #fef2f2; }

    .empty {
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

    .badge {
      display: inline-block;
      background: #eff6ff;
      color: #3b82f6;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Travel Planner ✈️</h1>
    <p class="subtitle">Plan your next adventure and keep track of your trips.</p>

    <div class="card">
      <h2>Add a Trip</h2>
      <div class="field">
        <label for="destination">Destination</label>
        <input type="text" id="destination" placeholder="e.g. Tokyo, Japan" />
      </div>
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date" />
      </div>
      <div class="field">
        <label for="memo">Memo</label>
        <textarea id="memo" placeholder="Notes, things to do, budget..."></textarea>
      </div>
      <button class="save-btn" onclick="saveTrip()">Save Trip</button>
    </div>

    <div class="card">
      <div class="trips-header">
        <h2>My Trips <span class="badge" id="trip-count">0</span></h2>
        <button class="clear-btn" onclick="clearAll()">Clear all</button>
      </div>
      <div id="trip-list"></div>
    </div>
  </div>

  <script>
    const ICONS = ['🗺️','🏖️','🏔️','🌆','🛤️','🏯','🗼','🌴','🏝️','🚂'];

    let trips = JSON.parse(localStorage.getItem('travel_trips') || '[]');

    function save() {
      localStorage.setItem('travel_trips', JSON.stringify(trips));
    }

    function render() {
      const list = document.getElementById('trip-list');
      const countEl = document.getElementById('trip-count');
      countEl.textContent = trips.length;

      if (trips.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🧳</div>
            No trips yet. Add your first one above!
          </div>`;
        return;
      }

      list.innerHTML = trips.map((trip, i) => `
        <div class="trip-item">
          <div class="trip-icon">${ICONS[i % ICONS.length]}</div>
          <div class="trip-body">
            <div class="trip-destination">${esc(trip.destination)}</div>
            ${trip.date ? `<div class="trip-date">${formatDate(trip.date)}</div>` : ''}
            ${trip.memo ? `<div class="trip-memo">${esc(trip.memo)}</div>` : ''}
          </div>
          <button class="delete-btn" onclick="deleteTrip(${i})" title="Delete">&#x2715;</button>
        </div>
      `).join('');
    }

    function saveTrip() {
      const destination = document.getElementById('destination').value.trim();
      const date = document.getElementById('date').value;
      const memo = document.getElementById('memo').value.trim();

      if (!destination) {
        document.getElementById('destination').focus();
        return;
      }

      trips.unshift({ destination, date, memo });
      save();
      render();

      document.getElementById('destination').value = '';
      document.getElementById('date').value = '';
      document.getElementById('memo').value = '';
      document.getElementById('destination').focus();
    }

    function deleteTrip(i) {
      trips.splice(i, 1);
      save();
      render();
    }

    function clearAll() {
      if (trips.length === 0) return;
      if (confirm('Delete all trips?')) {
        trips = [];
        save();
        render();
      }
    }

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[+m - 1]} ${+d}, ${y}`;
    }

    function esc(str) {
      return str
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/\n/g,'<br>');
    }

    document.getElementById('destination').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveTrip();
    });

    render();
  </script>
</body>
</html>
