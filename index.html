<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>SpotFetch</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f8f8f8;
  --t1:#111111;--t2:#666666;--t3:#999999;
  --border:rgba(0,0,0,0.08);
  --c0:#FF6B6B;--c0l:#FFF0F0;
  --c1:#4ECDC4;--c1l:#F0FFFE;
  --c2:#A78BFA;--c2l:#F5F0FF;
  --sh1:0 2px 12px rgba(0,0,0,0.08);
  --sh2:0 8px 32px rgba(0,0,0,0.12);
  --r2:12px;--r3:16px;--r4:20px;
  --nav:72px;
  --glass:rgba(255,255,255,0.88);
  --glass-b:1px solid rgba(255,255,255,0.6);
  --blur:blur(20px)
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e0e0e0}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,0.15);position:relative}
.tab-panel{flex:1;overflow:hidden;display:none;flex-direction:column;min-height:0}
.tab-panel.active{display:flex}

/* NAV */
#nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav);display:flex;align-items:center;justify-content:center;z-index:200;padding:0 16px calc(env(safe-area-inset-bottom,0px) + 10px);background:transparent;border-top:none}
#nav-pill{display:flex;align-items:center;background:rgba(255,255,255,0.72);-webkit-backdrop-filter:blur(28px) saturate(180%);backdrop-filter:blur(28px) saturate(180%);border:1px solid rgba(255,255,255,0.55);border-radius:999px;box-shadow:0 4px 28px rgba(0,0,0,0.11);padding:5px;gap:0;width:100%}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 6px;cursor:pointer;color:var(--t3);transition:all .2s;background:none;border:none;font-family:inherit;border-radius:999px}
.nav-btn svg{transition:all .2s}
.nav-btn.on{color:#111;background:rgba(0,0,0,0.09)}
.nav-btn.on svg{stroke-width:2.2}
.nav-btn:active{transform:scale(.92)}
.nav-lb{font-size:10px;font-weight:600;letter-spacing:.2px}
.nav-btn.on .nav-lb{font-weight:700}

/* HEADER */
.ph{padding:20px 20px 12px;flex-shrink:0}
.ph-title{font-size:24px;font-weight:700;letter-spacing:-.6px;color:var(--t1)}
.ph-sub{font-size:13px;color:var(--t2);margin-top:2px}

/* ═══ SPOTS TAB ═══ */
#tab-spots{background:var(--bg2)}
/* city filter tabs */
#spots-filter{padding:0 12px 10px;flex-shrink:0}
.city-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.city-tabs::-webkit-scrollbar{display:none}
.city-tab{flex-shrink:0;padding:7px 16px;border-radius:999px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;background:rgba(0,0,0,0.06);color:var(--t2);min-height:34px;white-space:nowrap}
.city-tab.on{background:#111;color:#fff}
.feed{flex:1;overflow-y:auto;padding:8px 12px calc(var(--nav) + 16px)}
.feed::-webkit-scrollbar{display:none}
.reel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.reel-card{background:var(--bg);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh1);cursor:pointer;transition:transform .18s}
.reel-card:active{transform:scale(.97)}
.reel-thumb{aspect-ratio:9/16;position:relative;overflow:hidden;background:#ddd}
.reel-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.reel-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.75))}
.reel-ov{position:absolute;bottom:0;left:0;right:0;padding:10px}
.reel-user{font-size:11px;color:rgba(255,255,255,.8);font-weight:600;margin-bottom:2px}
.reel-ttl{font-size:12px;font-weight:700;line-height:1.3;color:#fff}
.reel-date{font-size:10px;color:rgba(255,255,255,.6);margin-top:3px}
.plat-badge{position:absolute;top:8px;left:8px;padding:3px 7px;border-radius:12px;font-size:10px;font-weight:700;color:#fff}
.b-ig{background:linear-gradient(135deg,#f09433,#dc2743,#bc1888)}
.b-tt{background:#010101}
.reel-del{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);z-index:2}
.spot-pill{position:absolute;bottom:8px;right:8px;background:rgba(255,255,255,.2);backdrop-filter:blur(6px);color:#fff;border-radius:10px;padding:3px 8px;font-size:10px;font-weight:700;z-index:2}
.plan-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);color:#fff;border-radius:10px;padding:3px 8px;font-size:10px;font-weight:700;position:absolute;bottom:34px;right:8px;z-index:2}
.reel-expand{width:100%;padding:10px 14px;background:var(--bg);border:none;border-top:1px solid var(--border);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:inherit}
.reel-spots{overflow:hidden;max-height:0;transition:max-height .3s ease;background:var(--bg2)}
.reel-spots.open{max-height:500px}
.spot-mini{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px}
.spot-mini:last-child{border-bottom:none}
.smic-em{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.smic-name{font-size:13px;font-weight:600;color:var(--t1)}
.smic-desc{font-size:11px;color:var(--t2);margin-top:1px}

/* ═══ PLAN TAB ═══ */
#tab-plan{position:relative}
#plan-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;background:var(--bg);z-index:400;text-align:center}
#plan-empty.hidden{display:none}
.empty-il{font-size:56px;margin-bottom:20px}
.empty-title{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.4px}
.empty-sub{font-size:14px;color:var(--t2);margin-top:8px;line-height:1.6}
.empty-cta{margin-top:28px;padding:14px 28px;background:var(--t1);color:#fff;border:none;border-radius:999px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;min-height:44px}

/* map wrapper — z-index:1 creates stacking context so Leaflet panes stay inside */
#plan-map-wrap{flex:1;position:relative;min-height:0;z-index:1}
#plan-map{width:100%;height:100%}

/* map top bar */
#map-top-bar{position:absolute;top:16px;left:12px;right:12px;z-index:1000;display:flex;align-items:center;justify-content:space-between;gap:8px;pointer-events:none}
#city-btn-wrap{pointer-events:all;position:relative}
#city-btn{display:flex;align-items:center;gap:6px;padding:6px 4px;background:none;border:none;font-size:20px;font-weight:800;color:var(--t1);cursor:pointer;font-family:inherit;letter-spacing:-.4px;text-shadow:0 1px 6px rgba(255,255,255,0.9),0 0 20px rgba(255,255,255,0.7)}
#city-btn .chevron{display:flex;align-items:center;color:var(--t1);opacity:.75;margin-top:1px}
#city-picker{position:absolute;top:calc(100% + 8px);left:0;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.16);overflow:hidden;display:none;min-width:190px;z-index:1001}
#city-picker.open{display:block}
.city-opt{display:flex;align-items:center;gap:10px;width:100%;padding:13px 16px;font-size:15px;font-weight:600;color:#111;background:none;border:none;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s}
.city-opt:active{background:#f5f5f5}
.city-opt.on{font-weight:800}
/* day filter toggle */
#day-filter-btn{pointer-events:all;display:flex;align-items:center;gap:5px;padding:10px 16px;border-radius:999px;background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border:var(--glass-b);box-shadow:0 2px 14px rgba(0,0,0,0.14);font-size:15px;font-weight:700;color:var(--t1);cursor:pointer;font-family:inherit;min-height:44px}
#day-filter-btn .chevron{display:flex;align-items:center;color:var(--t2)}
#day-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.15);overflow:hidden;display:none;min-width:100px}
#day-dropdown.open{display:block}
.day-opt{display:block;width:100%;padding:13px 20px;font-size:15px;font-weight:600;color:var(--t1);background:none;border:none;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s}
.day-opt:active,.day-opt:hover{background:var(--bg2)}
.day-opt.on{color:#111;font-weight:700}
#day-selector-wrap{pointer-events:all;position:relative}

/* bottom sheet */
#plan-sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--glass);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
  border-top:var(--glass-b);border-radius:20px 20px 0 0;
  box-shadow:0 -4px 32px rgba(0,0,0,0.13);
  z-index:200;display:flex;flex-direction:column;
  will-change:height;
}
#plan-sheet.snapping{transition:height .32s cubic-bezier(.32,.72,0,1)}

/* handle zone — tall touch target */
#sheet-handle{
  padding:12px 16px 8px;display:flex;flex-direction:column;
  align-items:center;gap:6px;cursor:grab;flex-shrink:0;
  touch-action:none;user-select:none;-webkit-user-select:none;
}
#sheet-handle:active{cursor:grabbing}
.handle{width:40px;height:4px;background:rgba(0,0,0,0.18);border-radius:2px;flex-shrink:0}
#sheet-peek-label{font-size:13px;font-weight:600;color:var(--t2);white-space:nowrap}

/* day chips */
#sheet-chips{padding:0;flex-shrink:0}
.chips-row{display:flex;gap:8px;margin-bottom:8px}
.day-chip{flex:1;padding:8px 4px;border-radius:999px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;background:rgba(0,0,0,0.06);color:var(--t2);min-height:36px;display:flex;align-items:center;justify-content:center;gap:5px}
.day-chip.on{color:#fff;background:#111;border:none}
.day-chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.spot-new{display:inline-flex;align-items:center;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.3px;background:#F2F2F2;color:#111;border:1px solid #DCDCDC;margin-left:5px;vertical-align:middle;line-height:1.5}
.chip-summary{font-size:13px;color:var(--t2);line-height:1.4;padding:7px 10px;background:var(--bg2);border-radius:8px;margin-top:2px}

/* list */
#sheet-list{flex:1;overflow-y:auto;padding:4px 16px calc(var(--nav) + 24px);min-height:0;overscroll-behavior:contain}
#sheet-list::-webkit-scrollbar{display:none}
.list-day-grp{margin-bottom:24px}
.list-day-hdr{padding:18px 0 10px}
.list-day-badge{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:800;letter-spacing:-.1px;color:#111;margin-bottom:10px}
.list-day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.list-day-sum{font-size:14px;font-weight:500;color:#444;line-height:1.55;padding:12px 14px;background:var(--bg2);border-radius:10px;margin-bottom:8px}
.gap-warn{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#FFFBEB;border-radius:10px;margin-bottom:8px;border:1px solid #FDE68A}
.gap-warn-txt{font-size:12px;color:#92400E;flex:1}
.gap-warn-btn{font-size:12px;color:#D97706;font-weight:700;background:none;border:none;cursor:pointer;font-family:inherit;white-space:nowrap}
.list-spot-row{display:flex;align-items:center;gap:11px;padding:10px 0;cursor:pointer;transition:background .15s;border-radius:8px}
.list-spot-row:active{background:var(--bg2)}
.list-em-wrap{width:40px;height:40px;border-radius:11px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.list-info{flex:1;min-width:0}
.list-name{font-size:14px;font-weight:600;color:var(--t1)}
.list-desc{font-size:12px;color:var(--t2);margin-top:1px}
.drag-h{color:var(--t3);cursor:grab;font-size:16px;padding:4px;touch-action:none;flex-shrink:0}
.list-spot-row.drag-over{background:var(--bg2)}

/* excluded */
.excl-section{margin-top:16px;padding-top:8px;border-top:1px solid var(--border)}
.excl-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer}
.excl-hdr-txt{font-size:13px;font-weight:600;color:var(--t3)}
.excl-row{display:flex;align-items:center;gap:10px;padding:9px 0;opacity:.7}
.add-back{font-size:12px;font-weight:700;color:var(--t2);background:var(--bg2);border:none;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit;flex-shrink:0;min-height:32px}

/* inline spot detail (inside sheet) */
.sd-nav{display:flex;align-items:center;padding:0 0 10px}
.sd-nav-back{display:flex;align-items:center;gap:4px;background:none;border:none;font-size:14px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;padding:6px 0;min-height:36px}
.sd-hdr{display:flex;align-items:center;gap:14px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.sd-em{width:52px;height:52px;border-radius:14px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.sd-name{font-size:20px;font-weight:700;letter-spacing:-.4px;color:var(--t1)}
.sd-desc{font-size:13px;color:var(--t2);margin-top:3px}
.sd-body{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:14px}
.sd-act-row{display:flex;align-items:stretch;gap:8px;margin-bottom:14px}
.sd-map-btn{flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;background:var(--bg2);border:none;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s}
.sd-map-btn:active{background:rgba(0,0,0,0.09)}
.sd-map-icon{font-size:20px;flex-shrink:0}
.sd-map-label{font-size:13px;font-weight:600;color:var(--t1);line-height:1.3}
.sd-map-sub{font-size:11px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.sd-reel-btn{width:50px;flex-shrink:0;border-radius:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;letter-spacing:.3px;transition:opacity .15s}
.sd-reel-btn:active{opacity:.8}
.sd-reel-ig{background:linear-gradient(135deg,#f09433 0%,#dc2743 50%,#bc1888 100%)}
.sd-reel-tt{background:#010101}
/* iOS-style toggle switch */
.sw{position:relative;width:44px;height:26px;flex-shrink:0;cursor:pointer;display:inline-block}
.sw input{opacity:0;width:0;height:0;position:absolute;pointer-events:none}
.sw-track{position:absolute;inset:0;border-radius:999px;background:rgba(0,0,0,0.15);transition:background .25s cubic-bezier(.4,0,.2,1)}
.sw input:checked+.sw-track{background:#111}
.sw-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.28);transition:transform .25s cubic-bezier(.4,0,.2,1);pointer-events:none}
.sw input:checked~.sw-knob{transform:translateX(18px)}

/* ═══ EXPLORE TAB ═══ */
#tab-explore{background:var(--bg2)}
.ex-feed{flex:1;overflow-y:auto;padding:4px 16px calc(var(--nav) + 20px)}
.ex-feed::-webkit-scrollbar{display:none}
.ex-card{background:var(--bg);border-radius:var(--r4);margin-bottom:14px;overflow:hidden;box-shadow:var(--sh1)}
.ex-thumb{height:118px;position:relative;overflow:hidden}
.ex-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ex-thumb-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.5));display:flex;align-items:flex-end;padding:12px}
.ex-author{background:rgba(0,0,0,.45);backdrop-filter:blur(4px);color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.ex-body{padding:14px 16px 8px}
.ex-title{font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--t1)}
.ex-story{font-size:12px;color:var(--t2);margin-top:3px}
.ex-spots{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ex-pill{padding:5px 10px;border-radius:20px;background:var(--bg2);font-size:12px;font-weight:600;color:var(--t2)}
.ex-actions{display:flex;gap:8px;padding:10px 16px 16px}
.ex-btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;min-height:44px}
.ex-primary{background:var(--t1);color:#fff}
.ex-secondary{background:var(--bg2);color:var(--t1)}
.ex-btn:active{opacity:.85;transform:scale(.98)}
.ex-btn.done-g{background:#DCFCE7;color:#16A34A;pointer-events:none}
.ex-btn.done-b{background:#EEF2FF;color:#6366F1;pointer-events:none}

/* ═══ REEL BRIDGE ═══ */
#reel-bridge{position:absolute;inset:0;z-index:800;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(0,0,0,0.38);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.bridge-sheet{background:#fff;border-radius:24px 24px 0 0;padding:0 0 36px;overflow-y:auto;animation:slideUp .36s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.bridge-top{display:flex;flex-direction:column;align-items:center;padding:12px 20px 16px}
.bridge-pill{width:40px;height:4px;background:rgba(0,0,0,0.15);border-radius:2px;margin-bottom:16px}
.bridge-label{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;align-self:flex-start}
.bridge-reel{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border-radius:14px;width:100%}
.bridge-reel-badge{font-size:10px;font-weight:800;color:#fff;padding:3px 8px;border-radius:8px;flex-shrink:0}
.bridge-reel-user{font-size:12px;color:var(--t2);font-weight:600}
.bridge-reel-title{font-size:14px;font-weight:700;color:var(--t1);margin-top:1px;line-height:1.3}
.bridge-divider{width:100%;height:1px;background:var(--border);margin:4px 0 0}
.bridge-spots{padding:0 20px}
.bridge-spot-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.bridge-spot-row:last-child{border-bottom:none}
.bridge-spot-em{font-size:22px;flex-shrink:0;width:28px;text-align:center}
.bridge-spot-info{flex:1;min-width:0}
.bridge-spot-name{font-size:14px;font-weight:600;color:var(--t1)}
.bridge-spot-desc{font-size:12px;color:var(--t2);margin-top:1px}
.bridge-check{width:24px;height:24px;border-radius:50%;border:2px solid rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;font-size:13px;font-weight:700;color:transparent}
.bridge-check.on{background:#111;border-color:#111;color:#fff}
.bridge-actions{padding:20px 20px 0;display:flex;flex-direction:column;align-items:center;gap:4px}
.bridge-cta{width:100%;padding:16px;background:#111;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;min-height:52px;transition:opacity .15s}
.bridge-cta:active{opacity:.82}
.bridge-skip{background:none;border:none;font-size:14px;font-weight:500;color:var(--t2);cursor:pointer;font-family:inherit;padding:12px 24px;min-height:44px}

/* TOAST */
#toast{position:absolute;bottom:calc(var(--nav) + 14px);left:50%;transform:translateX(-50%) translateY(12px);background:#111;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:all .28s;z-index:999;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* LEAFLET */
.leaflet-container{font-family:inherit}

function getDaySummary(spots) {
  const t = spots.map(s=>s.type);
  const has = x => t.includes(x);
  if (has('ocean') && has('viewpoint') && has('cafe')) return '바다를 끼고 걷다가 카페로 마무리하는 날';
  if (has('ocean') && has('viewpoint'))  return '뷰포인트에서 시작해 해안으로 이어지는 하루';
  if (has('ocean') && has('cafe'))       return '바닷바람 맞으며 카페에서 쉬어가는 하루';
  if (has('nature') && has('cafe'))      return '브런치하고 공원에서 쉬어가는 여유로운 하루';
  if (has('viewpoint') && has('cafe'))   return '전망 포인트에서 시작해 카페로 이어지는 날';
  if (t.filter(x=>x==='cafe').length>=2) return '카페를 옮겨다니며 여유롭게 보내는 날';
  if (has('nature') && has('ocean'))     return '자연 속에서 걸으며 바다를 느끼는 하루';
  if (has('viewpoint'))  return '탁 트인 전망을 즐기며 걷는 날';
  if (has('nature'))     return '공원과 자연 속에서 쉬어가는 하루';
  if (has('cafe'))       return '카페에서 천천히 시작하는 하루';
  return '저장한 장소들을 둘러보는 날';
}

function getGapWarning(spots) {
  const t = spots.map(s=>s.type);
  if (!t.includes('dining') && !t.includes('cafe')) return '식사나 카페 장소가 없어요 — 근처를 찾아볼까요?';
  const outdoor = ['nature','ocean','viewpoint'];
  if (spots.length >= 2 && !t.some(x=>outdoor.includes(x))) return '실내 장소만 있어요. 야외 활동을 추가해볼까요?';
  return null;
}

// K-MEANS

function kMeans(spots, k) {
  if (!spots.length) return [];
  k = Math.min(k, spots.length);
  const sorted = [...spots].sort((a,b)=>a.lat-b.lat);
  let centroids = Array.from({length:k},(_,i)=>{
    const s = sorted[Math.floor(i*spots.length/k)];
    return {lat:s.lat,lng:s.lng};
  });
  let asgn = spots.map(()=>0);
  for(let iter=0;iter<20;iter++){
    const prev=[...asgn];
    asgn=spots.map(sp=>{
      let best=0,bestD=Infinity;
      centroids.forEach((c,ci)=>{const d=(sp.lat-c.lat)**2+(sp.lng-c.lng)**2;if(d<bestD){bestD=d;best=ci;}});
      return best;
    });
    for(let ci=0;ci<k;ci++){
      const g=spots.filter((_,i)=>asgn[i]===ci);
      if(g.length)centroids[ci]={lat:g.reduce((s,sp)=>s+sp.lat,0)/g.length,lng:g.reduce((s,sp)=>s+sp.lng,0)/g.length};
    }
    if(asgn.every((a,i)=>a===prev[i]))break;
  }
  const order=centroids.map((c,i)=>({i,lat:c.lat})).sort((a,b)=>b.lat-a.lat).map(x=>x.i);
  const remap={};
  order.forEach((old,ni)=>{remap[old]=ni;});
  return asgn.map(a=>remap[a]);
}

function recomputeClusters(){
  const active=activeSpots();
  const k=active.length<=3?1:active.length<=5?2:3;
  const asgn=kMeans(active,k);
  active.forEach((sp,i)=>{sp.cluster=asgn[i]??0;});
}

// ═══════════════════════════════════════════
// ROUTE GROUPS
// ═══════════════════════════════════════════
function buildGroups(){
  const active=activeSpots();
  if(!active.length){S.routeGroups=[];return;}
  recomputeClusters();
  const k=S.days<=1?1:S.days===2?2:3;
  const groups=[];
  for(let ci=0;ci<k;ci++){
    const grpSpots=active.filter(s=>s.cluster===ci);
    if(!grpSpots.length)continue;
    grpSpots.sort((a,b)=>b.lat-a.lat);
    groups.push({
      label:`Day ${ci+1}`,ci,
      spotIds:grpSpots.map(s=>s.id),
      summary:getDaySummary(grpSpots),
      gapWarn:getGapWarning(grpSpots),
    });
  }
  S.routeGroups=groups;
}

function initMap(){

function mkIcon(sp,sel=false){
  const bg=C[sp.cluster??0];
  return L.divIcon({html:`<div class="sf-mkr${sel?' sel':''}" style="background:${bg}">${sp.emoji}</div>`,className:'',iconSize:[40,40],iconAnchor:[20,20]});
}

function addMarkers(){
  Object.values(S.markers).forEach(m=>m.remove());S.markers={};
  activeSpots().forEach(sp=>{
    const m=L.marker([sp.lat,sp.lng],{icon:mkIcon(sp)}).addTo(S.map);
    m.on('click',()=>selSpot(sp.id));S.markers[sp.id]=m;
  });
}

function syncMarkers(){
  const active=activeSpots();const ids=new Set(active.map(s=>s.id));
  Object.entries(S.markers).forEach(([id,m])=>{if(!ids.has(id)){m.remove();delete S.markers[id];}});
  active.forEach(sp=>{
    if(!S.markers[sp.id]){
      const m=L.marker([sp.lat,sp.lng],{icon:mkIcon(sp)}).addTo(S.map);
      m.on('click',()=>selSpot(sp.id));S.markers[sp.id]=m;
    } else {
      S.markers[sp.id].setIcon(mkIcon(sp,S.selSpot===sp.id));
    }
  });
}

function fitActive(){
  const a=activeSpots();
  if(!S.map||!a.length)return;
  S.map.fitBounds(a.map(s=>[s.lat,s.lng]),{padding:[70,70]});
}

function drawLines(){
  S.lines.forEach(l=>l.remove());S.lines=[];
  S.routeGroups.forEach(g=>{
    const spots=g.spotIds.map(id=>getSpot(id)).filter(Boolean);
    if(spots.length<2)return;
    const line=L.polyline(spots.map(s=>[s.lat,s.lng]),{color:C[g.ci],weight:3,opacity:.7,dashArray:'8,5'}).addTo(S.map);
    S.lines.push(line);
  });
}

function snapHeights(){
  const tabH=document.getElementById('tab-plan').offsetHeight||window.innerHeight;

  const sheet=document.getElementById('plan-sheet');

// drag logic
(function(){
  let startY=0,startH=0,dragging=false,velY=0,lastY=0,lastT=0;
  function onStart(e){
    const t=e.touches?e.touches[0]:e;
    startY=t.clientY;lastY=t.clientY;lastT=Date.now();
    startH=document.getElementById('plan-sheet').offsetHeight;
    dragging=true;velY=0;
    document.getElementById('plan-sheet').classList.remove('snapping');
  }
  function onMove(e){
    if(!dragging)return;
    e.preventDefault();
    const t=e.touches?e.touches[0]:e;
    const dy=startY-t.clientY;
    const hs=snapHeights();
    const newH=Math.max(hs[0]-10,Math.min(startH+dy,hs[2]+20));
    document.getElementById('plan-sheet').style.height=newH+'px';
    const now=Date.now();const dt=now-lastT||1;
    velY=(lastY-t.clientY)/dt*1000;
    lastY=t.clientY;lastT=now;
  }
  function onEnd(){
    if(!dragging)return;
    dragging=false;
    const curH=document.getElementById('plan-sheet').offsetHeight;
    const hs=snapHeights();
    // velocity threshold: if flicking up/down strongly, jump a snap
    let target;
    if(velY>300)      target=Math.min(S.snap+1,SNAP.full);
    else if(velY<-300)target=Math.max(S.snap-1,SNAP.peek);
    else{
      // nearest snap
      const dists=hs.map((h,i)=>({i,d:Math.abs(h-curH)}));
      target=dists.sort((a,b)=>a.d-b.d)[0].i;
    }
    snapTo(target);
  }
  window.addEventListener('DOMContentLoaded',()=>{
    const h=document.getElementById('sheet-handle');
    if(!h)return;
    h.addEventListener('touchstart',onStart,{passive:true});
    h.addEventListener('touchmove',onMove,{passive:false});
    h.addEventListener('touchend',onEnd);
    h.addEventListener('mousedown',onStart);
    window.addEventListener('mousemove',e=>{if(dragging)onMove(e);});
    window.addEventListener('mouseup',()=>{if(dragging)onEnd();});
    h.addEventListener('click',()=>{
      if(!dragging){
        const next=[SNAP.mid,SNAP.full,SNAP.peek][S.snap];
        snapTo(next);
      }
    });
  });
})();

  const excl=[...S.excluded].map(id=>getSpot(id)).filter(Boolean);
  if(excl.length){
    html+=`<div class="excl-section">
      <div class="excl-hdr" onclick="toggleExcl()">
        <span class="excl-hdr-txt">패스한 곳 (${excl.length})</span>
        <span style="color:#bbb;display:flex;align-items:center;transition:transform .2s;transform:${S.exclOpen?'rotate(180deg)':'rotate(0deg)'}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
      </div>
      ${S.exclOpen?excl.map(sp=>`
        <div class="excl-row">
          <span style="font-size:18px">${sp.emoji}</span>
          <div class="list-info"><div class="list-name">${sp.name}</div></div>
          <label class="sw">
            <input type="checkbox" onchange="toggleSpotPlan('${sp.id}')">
            <span class="sw-track"></span>
            <span class="sw-knob"></span>
          </label>
        </div>`).join(''):''}
    </div>`;
  }
  wrap.innerHTML=html;
}

function toggleExcl(){S.exclOpen=!S.exclOpen;renderListView();}

function fromList(id){
  const sp=getSpot(id);if(!sp||!S.map)return;
  S.map.setView([sp.lat,sp.lng],14,{animate:true});
  selSpot(id);
}

// ═══════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════
let _d=null;
function dStart(e,id,day){_d={id,day};e.dataTransfer.effectAllowed='move';setTimeout(()=>{if(e.currentTarget)e.currentTarget.style.opacity='.4';},0);}
function dEnd(e){e.currentTarget.style.opacity='';document.querySelectorAll('.list-spot-row.drag-over').forEach(el=>el.classList.remove('drag-over'));}
function dOver(e,id,day){e.preventDefault();if(_d&&_d.id!==id)e.currentTarget.classList.add('drag-over');}
function dDrop(e,targetId,targetDay){
  e.preventDefault();
  if(!_d||_d.id===targetId){_d=null;return;}
  const src=S.routeGroups.find(g=>g.label===_d.day);
  const tgt=S.routeGroups.find(g=>g.label===targetDay);
  if(!src||!tgt){_d=null;return;}
  src.spotIds=src.spotIds.filter(id=>id!==_d.id);
  const ti=tgt.spotIds.indexOf(targetId);
  tgt.spotIds.splice(ti>=0?ti:tgt.spotIds.length,0,_d.id);
  _d=null;drawLines();renderSheetContent();
}

// ═══════════════════════════════════════════
// EXPLORE
// ═══════════════════════════════════════════
function renderExplore(){
  document.getElementById('ex-feed').innerHTML=EXPLORE_DATA.map(r=>`
    <div class="ex-card">
      <div class="ex-thumb"><img src="${r.photo}" alt="${r.title}" loading="lazy"><div class="ex-thumb-ov"><span class="ex-author">${r.author}</span></div></div>
      <div class="ex-body">
        <div class="ex-title">${r.title}</div>
        <div class="ex-story">${r.story}</div>
        <div class="ex-spots">${r.spots.map(s=>`<span class="ex-pill">${s.e} ${s.n}</span>`).join('')}</div>
      </div>
      <div class="ex-actions">
        <button class="ex-btn ex-primary" onclick="this.textContent='추가됨 ✓';this.className='ex-btn done-b';toast('Plan에 추가됐어요 ✨')">내 Plan에 추가</button>
        <button class="ex-btn ex-secondary" onclick="this.textContent='저장됨 ✓';this.className='ex-btn done-g';toast('Spot이 저장됐어요 🔖')">Spot 저장</button>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════
// REEL BRIDGE
// ═══════════════════════════════════════════
const _br = REELS_DATA[0];
const _bSpots = SPOTS_DATA.filter(s=>s.reelId===_br.id);
const _bSel = new Set(_bSpots.map(s=>s.id));

// only bridge reel spots start excluded — other spots already in plan
_bSpots.forEach(s=>S.excluded.add(s.id));

function renderBridge(){
  const badge=_br.platform==='instagram'
    ?'<span class="bridge-reel-badge b-ig">IG</span>'
    :'<span class="bridge-reel-badge b-tt">TT</span>';
  document.getElementById('bridge-reel-info').innerHTML=`
    ${badge}
    <div>
      <div class="bridge-reel-user">${_br.user}</div>
      <div class="bridge-reel-title">${_br.title}</div>
    </div>`;
  document.getElementById('bridge-spots').innerHTML=_bSpots.map(sp=>`
    <div class="bridge-spot-row" onclick="toggleBridgeSel('${sp.id}')">
      <span class="bridge-spot-em">${sp.emoji}</span>
      <div class="bridge-spot-info">
        <div class="bridge-spot-name">${sp.name}</div>
        <div class="bridge-spot-desc">${sp.desc}</div>
      </div>
      <div class="bridge-check on" id="bc-${sp.id}">✓</div>
    </div>`).join('');
}

function toggleBridgeSel(id){
  const el=document.getElementById('bc-'+id);
  if(_bSel.has(id)){_bSel.delete(id);el.className='bridge-check';el.textContent='';}
  else{_bSel.add(id);el.className='bridge-check on';el.textContent='✓';}
}

function confirmBridge(){
  _bSpots.forEach(sp=>{
    if(_bSel.has(sp.id)){S.excluded.delete(sp.id);S.newSpots.add(sp.id);}
  });
  document.getElementById('reel-bridge').style.display='none';
  buildGroups();
  initPlanTab();
}

function skipBridge(){
  // all spots stay excluded, go to Spots tab
  document.getElementById('reel-bridge').style.display='none';
  switchTab('spots');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderSpots();
renderExplore();
renderBridge();
</script>
